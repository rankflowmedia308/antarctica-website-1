<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 292 42"
     role="img" aria-label="Best Antarctica Cruise Companies — Independent Rankings &amp; Expert Reviews">

  <!-- ── Ship icon in circle ── -->
  <circle cx="19" cy="21" r="17" fill="#1B4F8A"/>
  <!-- Superstructure -->
  <rect x="13" y="14" width="12" height="7" rx="2" fill="white"/>
  <!-- Bridge wings -->
  <rect x="11" y="15.5" width="3" height="4" rx="1" fill="white" opacity="0.55"/>
  <rect x="24" y="15.5" width="3" height="4" rx="1" fill="white" opacity="0.55"/>
  <!-- Mast -->
  <line x1="19" y1="14" x2="19" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Radar arm -->
  <line x1="19" y1="10" x2="22.5" y2="11.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <!-- Hull -->
  <path d="M8 23 Q19 28.5 30 23 L28.5 21 H9.5 Z" fill="white"/>
  <!-- Teal wave accent -->
  <path d="M5.5 30.5 Q9 28.5 12.5 30.5 Q16 32.5 19.5 30.5 Q23 28.5 26.5 30.5 Q29 32 31.5 30.5"
        stroke="#0B9E98" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- ── Wordmark ──
       font-size="14" matches .site-nav a { font-size: .875rem } at 16px base
  -->
  <text y="24"
        font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14"
        font-weight="700">
    <tspan x="46" fill="#0B9E98">Best</tspan><tspan fill="#12192C"> Antarctica Cruise Companies</tspan>
  </text>

  <!-- Thin separator rule -->
  <line x1="46" y1="28.5" x2="290" y2="28.5" stroke="#D9E2EF" stroke-width="0.7"/>

  <!-- Tagline -->
  <text x="46" y="38"
        font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10"
        font-weight="500"
        fill="#5A6A82">Independent Rankings &amp; Expert Reviews</text>

</svg>
