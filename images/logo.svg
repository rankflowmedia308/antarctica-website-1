<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 100"
     role="img" aria-label="Best Antarctica Cruise Companies – Independent Rankings &amp; Expert Reviews">
  <defs>
    <!-- Circle background gradient -->
    <radialGradient id="sphereGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2768d4"/>
      <stop offset="100%" stop-color="#0c2352"/>
    </radialGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glowGrad" cx="38%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Clip to inner circle -->
    <clipPath id="innerCircle">
      <circle cx="50" cy="50" r="43"/>
    </clipPath>
    <!-- Drop shadow filter for badge -->
    <filter id="badgeShadow" x="-20%" y="-30%" width="140%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <!-- Drop shadow for emblem -->
    <filter id="emblemShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1B4F8A" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════
       EMBLEM
  ══════════════════════════════════════ -->

  <!-- Outer glow ring -->
  <circle cx="50" cy="51" r="47" fill="rgba(27,79,138,0.18)"/>
  <!-- Deep border ring -->
  <circle cx="50" cy="50" r="46" fill="#091c47" filter="url(#emblemShadow)"/>
  <!-- Thin accent ring (teal) -->
  <circle cx="50" cy="50" r="45.5" fill="none" stroke="#0B9E98" stroke-width="0.8" opacity="0.6"/>
  <!-- Main sphere fill -->
  <circle cx="50" cy="50" r="44" fill="url(#sphereGrad)"/>
  <!-- Specular overlay -->
  <circle cx="50" cy="50" r="44" fill="url(#glowGrad)"/>

  <!-- Ocean floor (dark water, bottom portion) -->
  <path d="M6,71 L94,71 L94,94 L6,94 Z" fill="#061136" clip-path="url(#innerCircle)"/>

  <!-- Wave 1 (background) -->
  <path d="M5,71 Q11,67 17,71 Q23,75 29,71 Q35,67 41,71 Q47,75 53,71
           Q59,67 65,71 Q71,75 77,71 Q83,67 89,71
           L89,74 Q83,70 77,74 Q71,78 65,74 Q59,70 53,74
           Q47,78 41,74 Q35,70 29,74 Q23,78 17,74 Q11,70 5,74 Z"
        fill="#0d2568" clip-path="url(#innerCircle)"/>
  <!-- Wave 2 (foreground, lighter) -->
  <path d="M5,75 Q11,71.5 17,75 Q23,78.5 29,75 Q35,71.5 41,75 Q47,78.5 53,75
           Q59,71.5 65,75 Q71,78.5 77,75 Q83,71.5 89,75
           L89,78 Q83,74.5 77,78 Q71,81.5 65,78 Q59,74.5 53,78
           Q47,81.5 41,78 Q35,74.5 29,78 Q23,81.5 17,78 Q11,74.5 5,78 Z"
        fill="#122b72" opacity="0.7" clip-path="url(#innerCircle)"/>

  <!-- ── Antarctica Continent Silhouette ──
       Centered at (0,0), scale 0.62, translate to (50,50).
       Peninsula points toward upper-left; main body occupies center-right.
       Going clockwise from peninsula tip.
  -->
  <g transform="translate(50,49) scale(0.62)" clip-path="url(#innerCircle)">
    <!-- Main landmass -->
    <path d="
      M -14,-34
      C -12,-30 -8,-24 -6,-20
      C -4,-16  0,-14  6,-16
      C 12,-18 20,-16 24,-8
      C 28,0   26,12  18,20
      C 10,28  -2,30  -12,24
      C -22,18 -28,6  -26,-6
      C -24,-16 -20,-24 -16,-30
      C -15,-32 -14,-34 -14,-34 Z
    " fill="white"/>
    <!-- Subtle ice texture / shelf shading on lower edge -->
    <path d="M -12,24 C -8,26 -2,28 4,27 C 10,26 16,22 18,20"
          fill="none" stroke="rgba(190,215,255,0.35)" stroke-width="2" stroke-linecap="round"/>
    <!-- Slight interior mountain-range hint -->
    <path d="M -4,-4 C 0,-2 4,0 8,-2 C 12,-4 14,-2 16,0"
          fill="none" stroke="rgba(180,205,250,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ── Ship Silhouette (bottom of emblem) ── -->
  <g transform="translate(50,71.5)" opacity="0.78">
    <!-- Wake lines -->
    <line x1="-11" y1="4" x2="-14" y2="5.5" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="11"  y1="4" x2="14"  y2="5.5" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
    <!-- Hull -->
    <path d="M-9,0 C-9,3 9,3 9,0 C7,-1 -7,-1 -9,0 Z" fill="white"/>
    <!-- Superstructure -->
    <rect x="-5" y="-6" width="10" height="7" rx="1.5" fill="white"/>
    <!-- Bridge wing -->
    <rect x="-7" y="-4" width="3.5" height="3" rx="0.8" fill="white" opacity="0.7"/>
    <rect x="3.5" y="-4" width="3.5" height="3" rx="0.8" fill="white" opacity="0.7"/>
    <!-- Mast -->
    <line x1="0" y1="-6" x2="0" y2="-11" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <!-- Radar arm -->
    <line x1="0" y1="-11" x2="3.5" y2="-9" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
    <!-- Radar dot -->
    <circle cx="3.5" cy="-9" r="0.9" fill="white"/>
  </g>

  <!-- ══ "BEST" Gold Badge ══ -->
  <rect x="29" y="1" width="42" height="19" rx="9.5" fill="#F0A400" filter="url(#badgeShadow)"/>
  <!-- Badge inner highlight -->
  <rect x="30" y="2" width="40" height="8" rx="7" fill="rgba(255,255,255,0.18)"/>
  <text x="50" y="14.5"
        text-anchor="middle"
        font-family="'Arial Black', 'Arial Bold', Arial, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="9"
        fill="white"
        letter-spacing="1.8">BEST</text>

  <!-- ══════════════════════════════════════
       WORDMARK
  ══════════════════════════════════════ -->

  <!-- Primary title -->
  <text y="48"
        font-family="Inter, 'Segoe UI', Arial, 'Helvetica Neue', sans-serif"
        font-weight="600"
        font-size="23">
    <tspan x="108" fill="#1B4F8A">Best </tspan><tspan fill="#12192C">Antarctica Cruise Companies</tspan>
  </text>

  <!-- Fine rule separator -->
  <line x1="108" y1="59" x2="535" y2="59" stroke="#D9E2EF" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="109" y="75"
        font-family="Inter, 'Segoe UI', Arial, 'Helvetica Neue', sans-serif"
        font-weight="400"
        font-size="11"
        fill="#5A6A82"
        letter-spacing="0.25">Independent Rankings &amp; Expert Reviews</text>

</svg>
